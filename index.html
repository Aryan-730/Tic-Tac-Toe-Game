<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe | Aryan Kedar </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main>
        <h1 class="title"> Tic Tac Toe Game</h1>

        <div class="msg-container hide">
            <h6 class="msg-title title">Winner !</h6>

        </div>

        <h6 class = "turn-msg msg-title">Player O's turn</h6>

        <div class="container d-flex flex-column align-items-center justify-content-center">

            <div class="game">
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
            </div>

        </div>

        <button type="button" id="reset-btn" class="btn btn-light">Reset Game</button>
        <button type="button" id="new-game-btn" class="btn btn-light hide">New Game</button>

    </main>

    <script src="script.js"></script>
</body>

</html>
