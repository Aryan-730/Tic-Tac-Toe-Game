    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Aryan Kedar</a>

    <main>
        <div class="titlediv">
            <h1 class="title">
                <ul type = "none">
                    <li>Tic Tac Toe Game</li>
                </ul> 
            </h1>
        </div>

        <div class="msg-container hide">
            <h6 class="msg-title title">Winner !</h6>
        </div>

        <h6 class="turn-msg msg-title">Player O's turn</h6>

        <div class="container d-flex flex-column align-items-center justify-content-center">

            <div class="game">
                <button class="box"></button>
                <button class="box"></button>

                <button class="box"></button>

                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
            </div>

        </div>

        <div class="buttons">
            <button type="button" id="reset-btn" class="btn btn-light m-5">Reset Game</button>
            <button type="button" id="new-game-btn" class="btn btn-light hide m-5">New Game</button>
        </div>
